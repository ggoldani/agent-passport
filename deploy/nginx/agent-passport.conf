server {
    listen 80;
    listen [::]:80;
    server_name agent-passport.xyz www.agent-passport.xyz;
    return 301 https://agent-passport.xyz$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.agent-passport.xyz;

    ssl_certificate /etc/letsencrypt/live/agent-passport.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent-passport.xyz/privkey.pem;

    return 301 https://agent-passport.xyz$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name agent-passport.xyz;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/agent-passport.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent-passport.xyz/privkey.pem;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data: https:; connect-src 'self' https://agent-passport.xyz" always;

    client_max_body_size 10m;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    send_timeout 60s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /health { proxy_pass http://127.0.0.1:3002; }
    location = /widget.js { proxy_pass http://127.0.0.1:3002; }
    location = /prepare-registration { proxy_pass http://127.0.0.1:3002; }
    location = /register-agent { return 301 /register; }

    location ^~ /agents/ { proxy_pass http://127.0.0.1:3000; }
    location = /agents { proxy_pass http://127.0.0.1:3000; }
    location ^~ /trust-check/ { proxy_pass http://127.0.0.1:3002; }
    location ^~ /badge-stats/ { proxy_pass http://127.0.0.1:3002; }
    location ^~ /badge/ { proxy_pass http://127.0.0.1:3002; }
    location ^~ /interactions/ { proxy_pass http://127.0.0.1:3002; }
    location ^~ /ratings/ { proxy_pass http://127.0.0.1:3002; }
    location ^~ /rich-ratings/ { proxy_pass http://127.0.0.1:3002; }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
